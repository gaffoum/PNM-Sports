document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

optimizeLegibility;\n  }\n  a { color: inherit; text-decoration: none; }\n  img { max-width: 100%; display: block; }\n\n  h1, h2, h3, h4 { font-family: var(--font-display); font-weight: 700; letter-spacing: -0.01em; margin: 0; line-height: 1.05; }\n\n  /* ============= NAV ============= */\n  .nav {\n    position: fixed; inset: 0 0 auto 0; z-index: 50;\n    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);\n    background: linear-gradient(180deg, rgba(4,16,31,0.85), rgba(4,16,31,0.55));\n    border-bottom: 1px solid transparent;\n    transition: border-color .3s ease, background .3s ease;\n  }\n  .nav.scrolled { border-bottom-color: var(--line); }\n  .nav-inner {\n    max-width: var(--max); margin: 0 auto;\n    display: flex; align-items: center; justify-content: space-between;\n    padding: 16px var(--pad);\n  }\n  .brand { display: flex; align-items: center; gap: 12px; }\n  .brand-logo { width: 36px; height: 40px; }\n  .brand-text {\n    font-family: var(--font-display); font-weight: 800;\n    letter-spacing: 0.14em; font-size: 14px;\n  }\n  .brand-text small { display: block; font-weight: 400; letter-spacing: 0.4em; font-size: 9px; color: var(--cyan-bright); margin-top: 2px; }\n  .nav-links { display: flex; gap: 32px; align-items: center; }\n  .nav-links a { font-size: 13.5px; color: var(--text-dim); transition: color .2s; letter-spacing: 0.02em; }\n  .nav-links a:hover { color: var(--cyan-bright); }\n  .nav-cta {\n    padding: 10px 18px; border-radius: 999px;\n    background: linear-gradient(135deg, var(--cyan), #0e8cb0);\n    color: #03131e; font-weight: 600; font-size: 13px;\n    box-shadow: 0 8px 24px -8px rgba(26, 184, 224, 0.5);\n    transition: transform .2s, box-shadow .2s;\n  }\n  .nav-cta:hover { transform: translateY(-1px); box-shadow: 0 12px 28px -8px rgba(26, 184, 224, 0.7); }\n  @media (max-width: 760px) { .nav-links a:not(.nav-cta) { display: none; } }\n\n  /* ============= HERO ============= */\n  .hero {\n    position: relative; m on-head reveal\">\n      <div class=\"section-eyebrow\">Nos services<\u002Fdiv>\n      <h2>Quatre piliers, une trajectoire.<\u002Fh2>\n      <p>De la signature du premier contrat à la construction d'une carrière internationale, nous orchestrons chaque étape avec rigueur et discrétion.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"services-grid\">\n      <div class=\"service-card reveal\">\n        <div class=\"service-num\" hidden=\"\">/ 01<\u002Fdiv>\n        <div class=\"service-icon\">\n          <!-- Joueur + brassard : accompagnement -->\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <circle cx=\"16\" cy=\"7\" r=\"3.2\"><\u002Fcircle>\n            <path d=\"M9 28v-7a3 3 0 0 1 3-3h8a3 3 0 0 1 3 3v7\"><\u002Fpath>\n            <path d=\"M9 21l-3 5\"><\u002Fpath><path d=\"M23 21l3 5\"><\u002Fpath>\n            <path d=\"M11 14h10\" opacity=\"0.55\"><\u002Fpath>\n            <circle cx=\"21.5\" cy=\"15.2\" r=\"1.6\" fill=\"currentColor\" stroke=\"none\" opacity=\"0.7\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Services aux joueurs<\u002Fh3>\n        <p>Accompagnement sportif, juridique et personnel pour libérer le potentiel de chaque athlète, à chaque étape.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"service-card reveal delay-1\">\n        <div class=\"service-num\" hidden=\"\">/ 02<\u002Fdiv>\n        <div class=\"service-icon\">\n          <!-- Contrat avec poignée de main -->\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M6 4h13l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z\"><\u002Fpath>\n            <path d=\"M19 4v5h5\" opacity=\"0.55\"><\u002Fpath>\n            <path d=\"M9 14.5l2.4 2.4 2.2-2.2 2.2 2.2 2.4-2.4\"><\u002Fpath>\n            <path d=\"M9 21h11\" opacity=\"0.4\"><\u002Fpath>\n            <circle cx=\"22.5\" cy=\"22.5\" r=\"4.2\" fill=\"#04101f\"><\u002Fcircle>\n            <path d=\"M20.5 22.5l1.5 1.5 3-3\" stroke=\"#7ce3ff\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Négociation des contrats<\u002Fh3>\n        <p>Stratégie de négociation rigoureuse, lecture fine des marchés et défense des intérêts de nos joueurs.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"service-card reveal delay-2\">\n        <div class=\"service-num\" hidden=\"\">/ 03<\u002Fdiv>\n        <div class=\"service-icon\">\n          <!-- Coffre / patrimoine + courbe de croissance -->\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M5 11l11-5 11 5v8c0 5-4.5 8.5-11 10C9.5 27.5 5 24 5 19z\"><\u002Fpath>\n            <path d=\"M11 16l3 3 4-5 4 4\" stroke=\"#7ce3ff\"><\u002Fpath>\n            <circle cx=\"22\" cy=\"18\" r=\"1.4\" fill=\"#7ce3ff\" stroke=\"none\"><\u002Fcircle>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Gestion des actifs<\u002Fh3>\n        <p>Structuration patrimoniale, fiscalité internationale, investissements maîtrisés pour bâtir l'après-carrière.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"service-card reveal delay-3\">\n        <div class=\"service-num\" hidden=\"\">/ 04<\u002Fdiv>\n        <div class=\"service-icon\">\n          <!-- Megaphone + ondes -->\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 32 32\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <path d=\"M5 13v6l3 1v3a2 2 0 0 0 4 0v-2.4L24 25V7L12 11.4H8a3 3 0 0 0-3 3z\"><\u002Fpath>\n            <path d=\"M27 11c1.4 1.5 1.4 8.5 0 10\" opacity=\"0.6\"><\u002Fpath>\n            <path d=\"M30 8c2.5 3 2.5 13 0 16\" opacity=\"0.35\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <h3>Communication &amp; Performance<\u002Fh3>\n        <p>Image, réseaux sociaux, préparation mentale et physique : un écosystème complet autour de la performance.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ RÉSEAU ================ -->\n<section class=\"reseau\" id=\"reseau\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <div class=\"section-eyebrow\">Le Réseau<\u002Fdiv>\n      <h2>Un maillage international.<\u002Fh2>\n      <p>De l'Europe au Maghreb, du Golfe à l'Asie : notre réseau de collaborateurs ouvre à nos joueurs les ligues majeures du monde entier.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"map-wrap reveal\" id=\"globeContainer\">\n      <canvas class=\"globe-canvas\" id=\"globeCanvas\"><\u002Fcanvas>\n      <div class=\"globe-labels\" id=\"globeLabels\"><\u002Fdiv>\n      <div class=\"globe-hint\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><circle cx=\"12\" cy=\"12\" r=\"9\" opacity=\"0.4\"><\u002Fcircle><\u002Fsvg>\n        Cliquez et glissez pour faire pivoter\n      <\u002Fdiv>\n      <div class=\"map-legend\">\n        <div class=\"item\"><span class=\"swatch\"><\u002Fspan>Hub Paris<\u002Fdiv>\n        <div class=\"item\"><span class=\"swatch\" style=\"background:#cfe6f2; box-shadow:none\"><\u002Fspan>Partenaire<\u002Fdiv>\n        <div class=\"item\"><span class=\"swatch\" style=\"background:transparent; border: 1px dashed var(--cyan-bright); box-shadow:none\"><\u002Fspan>Liaison active<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n\n    <div class=\"reseau-stats\">\n      <div class=\"rstat reveal\"><div class=\"num\" data-count=\"20\">0<\u002Fdiv><div class=\"lbl\">Pays couverts<\u002Fdiv><\u002Fdiv>\n      <div class=\"rstat reveal delay-1\"><div class=\"num\" data-count=\"50\">0<\u002Fdiv><div class=\"lbl\">Ligues partenaires<\u002Fdiv><\u002Fdiv>\n      <div class=\"rstat reveal delay-2\"><div class=\"num\" data-count=\"100\">0<\u002Fdiv><div class=\"lbl\">Transferts réalisés<\u002Fdiv><\u002Fdiv>\n      <div class=\"rstat reveal delay-3\"><div class=\"num\">24/7<\u002Fdiv><div class=\"lbl\">Suivi joueurs<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ EQUIPE ================ -->\n<section class=\"equipe\" id=\"equipe\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <div class=\"section-eyebrow\">L'Équipe<\u002Fdiv>\n      <h2>Neuf experts, une famille.<\u002Fh2>\n      <p>Agents licenciés, scouts, analystes, partenaires régionaux : chacun apporte une expertise au service d'une ambition commune.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"team-grid\" id=\"teamGrid\">\n      <!-- injected by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ FAMILLE ================ -->\n<section class=\"famille\" id=\"famille\">\n  <div class=\"container\">\n    <div class=\"section-head reveal\">\n      <div class=\"section-eyebrow\">La Famille<\u002Fdiv>\n      <h2>Les talents que nous accompagnons.<\u002Fh2>\n      <p>Du Paris Saint-Germain à l'Olympique de Marseille, en passant par Monaco et Reims : nos joueurs et joueuses écrivent leur histoire au plus haut niveau.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"roster\" id=\"rosterGrid\">\n      <!-- injected by JS -->\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ CTA ================ -->\n<section class=\"cta\" id=\"contact\">\n  <div class=\"cta-card reveal\">\n    <div class=\"cta-card-inner\">\n      <div>\n        <div class=\"section-eyebrow\">Contact<\u002Fdiv>\n        <h2>Construisons votre prochain chapitre.<\u002Fh2>\n        <p>Joueur, club, partenaire institutionnel — parlons de votre projet. Notre équipe vous répond sous 48 h.<\u002Fp>\n      <\u002Fdiv>\n      <form class=\"cta-form\" id=\"contactForm\">\n        <div class=\"row\">\n          <div>\n            <label>Nom<\u002Flabel>\n            <input type=\"text\" name=\"nom\" id=\"f-nom\" placeholder=\"Votre nom\" required=\"\">\n          <\u002Fdiv>\n          <div>\n            <label>Email<\u002Flabel>\n            <input type=\"email\" name=\"email\" id=\"f-email\" placeholder=\"vous@exemple.com\" required=\"\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <label>Votre projet<\u002Flabel>\n          <textarea name=\"message\" id=\"f-msg\" placeholder=\"Quelques mots sur votre situation…\" required=\"\"><\u002Ftextarea>\n        <\u002Fdiv>\n        <button type=\"submit\" class=\"btn btn-primary\">Envoyer le message <span class=\"arrow\">→<\u002Fspan><\u002Fbutton>\n        <div class=\"cta-form-status\" id=\"contactStatus\"><\u002Fdiv>\n      <\u002Fform>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ================ FOOTER ================ -->\n<footer>\n  <div class=\"footer-inner\">\n    <div>© 2026 PNM Sports Agency · Tous droits réservés.<\u002Fdiv>\n    <div class=\"links\">\n      <a href=\"#services\">Services<\u002Fa>\n      <a href=\"#reseau\">Réseau<\u002Fa>\n      <a href=\"#equipe\">Équipe<\u002Fa>\n      <a href=\"#contact\">Contact<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- ================ PLAYER MODAL ================ -->\n<div class=\"player-modal\" id=\"playerModal\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Profil joueur\">\n  <div class=\"pm-backdrop\" id=\"playerModalBackdrop\"><\u002Fdiv>\n  <div class=\"pm-dialog\">\n    <button class=\"pm-close\" id=\"playerModalClose\" aria-label=\"Fermer\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M6 6l12 12M18 6L6 18\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n    <div class=\"pm-body\" id=\"playerModalBody\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ============== TEAM DATA ==============\n  const team = [\n    { name: \"Marc Leclère\", role: \"Agent Pro\", initials: \"ML\" },\n    { name: \"François Favreau\", role: \"Actionnaire · Arbitre\", initials: \"FF\" },\n    { name: \"Emmanuel Lafitte\", role: \"Licencié FFF\", initials: \"EL\" },\n    { name: \"Mamoudou Cissokho\", role: \"Partenaire Pro Europe\", initials: \"MC\" },\n    { name: \"Hassan El Marhoum\", role: \"Partenaire Pro Europe\", initials: \"HE\" },\n    { name: \"Théo Pires\", role: \"Scout & Analyste\", initials: \"TP\" },\n    { name: \"Yahia Rahou\", role: \"Scout\", initials: \"YR\" },\n    { name: \"Olivier Guillemont\", role: \"Partenaire Golfe & Maghreb\", initials: \"OG\" },\n    { name: \"Yinka Oyedotun\", role: \"Partenaire Afrique\", initials: \"YO\" }\n  ];\n  const teamGrid = document.getElementById(\"teamGrid\");\n  team.forEach((m, i) => {\n    const el = document.createElement(\"div\");\n    el.className = \"member reveal\" + (i % 3 === 1 ? \" delay-1\" : i % 3 === 2 ? \" delay-2\" : \"\");\n    el.innerHTML = `\n      <div class=\"member-avatar\">${m.initials}<\u002Fdiv>\n      <h4>${m.name}<\u002Fh4>\n      <div class=\"role\">${m.role}<\u002Fdiv>\n    `;\n    teamGrid.appendChild(el);\n  });\n\n  // ============== ROSTER DATA ==============\n  const roster = [\n    {\n      name: \"Dylan Durivaux\", club: \"Red Star FC\", pos: \"Défenseur droit · Ligue 2\", num: \"01\", year: \"2001\",\n      photo: \"assets/players/dylan.png\",\n      bio: \"Né en 2001 à Cannes, Dylan effectue sa formation à l'AS Saint-Étienne. Son parcours l'amène ensuite à l'EA Guingamp puis à Niort où il effectue, en 2022, ses premiers pas en professionnel. Aujourd'hui, Dylan joue au Red Star en Ligue 2, cumulant plus de 100 matchs à ce niveau. Son avenir s'inscrit en Ligue 1 grâce à sa constance tant dans sa progression que ses performances.\"\n    },\n    {\n      name: \"Kelian Lepironnec\", club: \"Olympique de Marseille\", pos: \"Milieu · International U16\", num: \"02\", year: \"2006\",\n      photo: \"assets/players/kelian.png\",\n      bio: \"Né en 2006 à Montreuil, Kelian intègre le centre de formation d'Amiens à quinze ans. Il sera international U16. Peu avant dix-sept ans, il est convoité par les plus grands clubs français. Kelian s'engagera sous contrat professionnel avec l'Olympique de Marseille avec qui il gagnera la Coupe Gambardella en 2024. Il intègre le groupe professionnel avec l'ambition de s'imposer au sein de celui-ci.\"\n    },\n    {\n      name: \"Océane Toussaint dit Marseille\", club: \"Paris Saint-Germain\", pos: \"Gardienne · France U23\", num: \"03\", year: \"2004\",\n      photo: \"assets/players/oceane.png\",\n      bio: \"Née en 2004 à Bagnolet, elle rentre au centre de formation du Paris SG à quinze ans. Après trois années de formation, elle est distinguée comme TITI D'OR qui décerne chaque année, le titre de la meilleure joueuse du centre de formation. S'en suit la signature de son premier contrat professionnel. Internationale France U23, elle sera prêtée six mois au HAC lors de sa première année en professionnelle. Aujourd'hui, elle inscrit son avenir avec la sélection Haïtienne et la Coupe du Monde 2027 en ligne de mire.\"\n    },\n    {\n      name: \"Ornella Graziani\", club: \"Paris Saint-Germain\", pos: \"Milieu offensif · Euro U17\", num: \"04\", year: \"2007\",\n      photo: \"assets/players/ornella.png\",\n      bio: \"Née en 2007 à Meaux, Ornella intègre le centre de formation du Paris SG lors de son année U16 et jouera immédiatement avec les U19. Rapidement, elle est sélectionnée en équipe de France et soulèvera lors de cette même année, son premier trophée international, l'EURO U17. En 2025, elle gagnera le championnat U19 et signera dans la foulée, son premier contrat professionnel. Ornella tentera d'enrichir sa vitrine à trophées en participant à l'EURO U19 en 2026.\"\n    },\n    {\n      name: \"Layan Affoum Bisignano\", club: \"Stade de Reims\", pos: \"Défenseur central\", num: \"05\", year: \"2008\",\n      photo: \"assets/players/layan.png\",\n      bio: \"Né en 2008 à Ermont, Layan joue en école de foot et en préformation dans le club de Rueil FC. Rapidement identifié pour son assurance, son intelligence et sa maîtrise technique au poste. Il s'engagera, après plusieurs essais notamment à Lyon et à Troyes, avec le Stade de Reims. Aujourd'hui, Layan finit sa formation à Reims qui lui confirme sa confiance en le contractualisant deux années supplémentaires grâce à son sérieux et ses performances. Le niveau professionnel est tout proche.\"\n    },\n    {\n      name: \"Mattéo Le Delas\", club: \"Valenciennes FC\", pos: \"Latéral droit · France U18\", num: \"06\", year: \"2007\",\n      photo: \"assets/players/matteo.png\",\n      bio: \"Né en 2007 à Saint-Maurice, Mattéo fait son école de foot à Joinville et sa préformation et jouera à Torcy jusqu'en U16 où il sera surclassé en U17 Nationaux. Durant cette période, il fera des essais dans les plus grands clubs et décidera de s'engager avec le VAFC. S'imposant en U19 dès son arrivée, Mattéo sera récompensé en devenant international U18. Bien avant la fin de sa formation, il signera un contrat stagiaire « anticipé ». S'entraînant avec les « Pros », il est prêt à s'imposer au plus haut niveau.\"\n    },\n    {\n      name: \"Andrew Marie-Sainte\", club: \"Paris FC\", pos: \"Milieu · France U17\", num: \"07\", year: \"2008\",\n      photo: \"assets/players/andrew.png\",\n      bio: \"Né en 2008 à Saint-Denis, Andrew jouera en jeune à Sarcelles. Souvent surclassé, il contribue à la promotion en U17 Nationaux de son club alors qu'il est U15. Il signera dans la foulée, son contrat de formation avec le Paris FC. Lors de sa première saison, il est surclassé en U17 et fait ses premières sélections en Equipe de France. Toujours surclassé les années suivantes, il va effectuer sa post-formation dans son club formateur.\"\n    },\n    {\n      name: \"Paris Émilie Daramola\", club: \"Paris Saint-Germain\", pos: \"Défenseure centrale\", num: \"08\", year: \"2009\",\n      photo: \"assets/players/paris.png\",\n      bio: \"Née en 2009 à Rouen, Paris débute le football au FC Rouen. Elle n'y reste que quelques mois et poursuit dans le club voisin, Quevilly Rouen Métropole. Progressant à grand pas, elle est suivie par plusieurs clubs professionnels. En 2024, elle intègre le centre de formation du Paris SG avec plein d'ambitions. Paris va vite taper dans l'œil des sélectionneurs et aujourd'hui, elle s'entraîne avec l'équipe professionnelle et a même fait une première titularisation récemment.\"\n    },\n    {\n      name: \"Waren Jean-Louis\", club: \"AS Monaco\", pos: \"Latéral droit\", num: \"09\", year: \"2009\",\n      photo: \"assets/players/waren.png\",\n      bio: \"Né en 2009 à Meaux, Waren fait son école de foot et sa préformation au sein de son club de toujours, le CS Meaux. Durant ses deux années de formation, il intègrera le Pôle Espoir de Reims. En parallèle, il est suivi de près par plusieurs clubs professionnels. Waren signe un ANS avec l'AS Monaco, club qu'il intègre en 2024 pour suivre sa formation. Titulaire régulier en 17 nationaux, il poursuit avec assiduité son parcours.\"\n    },\n    {\n      name: \"Gloria Lindsay Bekoundou\", club: \"Paris Saint-Germain\", pos: \"Latérale gauche · INF Clairefontaine\", num: \"10\", year: \"2009\",\n      photo: \"assets/players/gloria.png\",\n      bio: \"Née en 2009 à Melun, Gloria commencera le football à l'US Moissy, club de sa ville. Systématiquement surclassée, elle performe à l'école de foot. Ses performances lui permettent d'intégrer l'INF Clairefontaine pour suivre sa préformation. Elle est vite remarquée par l'Olympique Lyonnais et le Paris SG. S'engageant avec le club de la capitale et performant dès son intégration, elle fait ses premiers pas en sélection qu'elle ne quittera plus. Gloria continue de progresser et devrait faire ses premiers groupes pros prochainement.\"\n    }\n  ];\n  const rosterGrid = document.getElementById(\"rosterGrid\");\n  roster.forEach((p, i) => {\n    const el = document.createElement(\"button\");\n    el.type = \"button\";\n    el.className = \"player reveal\" + (i % 4 === 1 ? \" delay-1\" : i % 4 === 2 ? \" delay-2\" : i % 4 === 3 ? \" delay-3\" : \"\");\n    el.setAttribute(\"data-player-idx\", i);\n    el.setAttribute(\"aria-label\", `${p.name} — ${p.club}`);\n    el.innerHTML = `\n      <img class=\"player-photo\" src=\"${p.photo}\" alt=\"${p.name}\" loading=\"lazy\"/>\n      <div class=\"player-meta\">\n        <div class=\"player-club\">${p.club}<\u002Fdiv>\n        <div class=\"player-name\">${p.name}<\u002Fdiv>\n        <div class=\"player-pos\">${p.pos}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"player-cta\" aria-hidden=\"true\">Découvrir →<\u002Fdiv>\n    `;\n    rosterGrid.appendChild(el);\n  });\n\n  // ============== PLAYER MODAL ==============\n  const modal = document.getElementById(\"playerModal\");\n  const modalBody = document.getElementById(\"playerModalBody\");\n  const modalClose = document.getElementById(\"playerModalClose\");\n  const modalBackdrop = document.getElementById(\"playerModalBackdrop\");\n  function openPlayer(idx) {\n    const p = roster[idx];\n    if (!p) return;\n    modalBody.innerHTML = `\n      <div class=\"pm-photo-wrap\">\n        <img class=\"pm-photo\" src=\"${p.photo}\" alt=\"${p.name}\"/>\n        <div class=\"pm-num\">${p.num}<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pm-info\">\n        <div class=\"pm-club\">${p.club}<\u002Fdiv>\n        <h3 class=\"pm-name\">${p.name}<\u002Fh3>\n        <div class=\"pm-pos\">${p.pos}<\u002Fdiv>\n        <div class=\"pm-divider\"><\u002Fdiv>\n        <p class=\"pm-bio\">${p.bio}<\u002Fp>\n        <div class=\"pm-meta\">\n          <span><span class=\"pm-meta-lbl\">Promotion<\u002Fspan><span class=\"pm-meta-val\">${p.year}<\u002Fspan><\u002Fspan>\n          <span><span class=\"pm-meta-lbl\">N°<\u002Fspan><span class=\"pm-meta-val\">${p.num}<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `;\n    modal.classList.add(\"open\");\n    document.body.style.overflow = \"hidden\";\n  }\n  function closePlayer() {\n    modal.classList.remove(\"open\");\n    document.body.style.overflow = \"\";\n  }\n  // ============== CONTACT FORM ==============\n  const contactForm = document.getElementById(\"contactForm\");\n  if (contactForm) {\n    contactForm.addEventListener(\"submit\", (e) => {\n      e.preventDefault();\n      // TODO: en production, brancher Resend ici (fetch POST vers /api/contact)\n      const status = document.getElementById(\"contactStatus\");\n      if (status) status.textContent = \"✓ Merci, votre message a bien été envoyé. Nous vous répondrons sous 48 h.\";\n      contactForm.reset();\n    });\n  }\n\n  rosterGrid.addEventListener(\"click\", (e) => {\n    const card = e.target.closest(\"[data-player-idx]\");\n    if (!card) return;\n    openPlayer(+card.getAttribute(\"data-player-idx\"));\n  });\n  modalClose.addEventListener(\"click\", closePlayer);\n  modalBackdrop.addEventListener(\"click\", closePlayer);\n  document.addEventListener(\"keydown\", (e) => { if (e.key === \"Escape\") closePlayer(); });\n\n  // ============== NAV SHADOW ==============\n  const nav = document.getElementById(\"nav\");\n  window.addEventListener(\"scroll\", () => {\n    nav.classList.toggle(\"scrolled\", window.scrollY > 12);\n  }, { passive: true });\n\n  // ============== REVEAL OBSERVER ==============\n  const io = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        e.target.classList.add(\"in\");\n        // Animate counter if applicable\n        const counters = e.target.querySelectorAll(\"[data-count]\");\n        counters.forEach(animateCount);\n        if (e.target.matches(\"[data-count]\")) animateCount(e.target);\n        io.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.12, rootMargin: \"0px 0px -40px 0px\" });\n  document.querySelectorAll(\".reveal\").forEach(el => io.observe(el));\n\n  function animateCount(el) {\n    const target = parseInt(el.dataset.count, 10);\n    if (isNaN(target)) return;\n    const dur = 1400;\n    const start = performance.now();\n    function tick(now) {\n      const t = Math.min(1, (now - start) / dur);\n      const eased = 1 - Math.pow(1 - t, 3);\n      el.textContent = Math.round(target * eased);\n      if (t < 1) requestAnimationFrame(tick);\n    }\n    requestAnimationFrame(tick);\n  }\n<\u002Fscript>\n\n<script src=\"369b9a5c-5986-4d3c-8396-d6b9aabd97e9\"><\u002Fscript>\n<script src=\"9d798b57-be53-4c81-b52c-b4d6d0b917da\"><\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
